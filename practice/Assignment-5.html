<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Images Practice</title>
</head>

<body>

    <h1>HTML Images Demonstration Page</h1>

    <h2>Local Images</h2>

    <!-- PNG Image -->
    <img src="images/garden.jpg" 
         alt="Beautiful green landscape with flowers and trees" 
         width="300">

    <br><br>

    <!-- JPEG Image -->
    <img src="images/moon.avif" 
         alt="Modern city skyline during night" 
         width="300">

    <br><br>

    <!-- AVIF Image with Title Attribute -->
    <img src="images/swan.png" 
         alt="bird with peace and glowing background" 
         title="Swan" 
         width="300">

    <h2>External Image</h2>

    <img src="https://d2rqvd0kuag1qx.cloudfront.net/blog-8.jpg"
         alt="Sharp eye eagle flying over the skyline"
         width="400">

</body>
</html>
