<html>
<head>
    <title>User Registration Form</title>
</head>
<body>

<h2>User Registration Form</h2>

<form method="post" action="submit.html">

    <fieldset>
        <legend>Personal Information</legend>

        <!-- Full Name -->
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname"
               placeholder="FirstName_LastName"
               pattern="[A-Za-z_]+"
               required>
        <br><br>

        <!-- About Yourself -->
        <label for="about">About Yourself:</label><br>
        <textarea id="about" name="about" rows="5" cols="50"></textarea>
        <br><br>

        <!-- Email -->
        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required>
        <br><br>

        <!-- Password -->
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"
               minlength="8" required>
        <br><br>

        <!-- Phone Number -->
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone"
               pattern="[0-9]{10}"
               placeholder="10 digit number"
               required>
        <br><br>

        <!-- Website -->
        <label for="website">Website (Optional):</label><br>
        <input type="url" id="website" name="website">
        <br><br>

    </fieldset>

    <fieldset>
        <legend>Skills & Preferences</legend>

        <!-- Skills -->
        <label>Skills:</label><br>
        <input type="checkbox" name="skills" value="HTML" checked> HTML
        <input type="checkbox" name="skills" value="CSS"> CSS
        <input type="checkbox" name="skills" value="JavaScript"> JavaScript
        <br><br>

        <!-- Gender -->
        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Female" checked> Female
        <input type="radio" name="gender" value="Male"> Male
        <br><br>

        <!-- Preferred Color -->
        <label for="color">Preferred Color:</label><br>
        <input type="color" id="color" name="color" value="#0000ff">
        <br><br>

        <!-- Experience Level -->
        <label for="experience">Experience Level:</label><br>
<select id="experience" name="experience">
    <option value="0">0</option>
    <option value="2">2</option>
    <option value="4">4</option>
    <option value="6">6</option>
    <option value="8">8</option>
    <option value="10">10</option> 
</select> 
<br>
<br>

        <!-- Search Interest -->
        <label for="search">Search Interest (Optional):</label><br>
        <input type="search" id="search" name="search">
        <br><br>

    </fieldset>

    <fieldset>
        <legend>Date & Time Inputs</legend>

        <!-- Date of Birth -->
        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob"
               max="2005-12-31">
        <br><br>

        <!-- Available Time -->
        <label for="time">Available Time:</label><br>
        <input type="time" id="time" name="time"
               min="09:00" max="18:30">
        <br><br>

        <!-- Joining Month -->
        <label for="joining">Joining Date:</label><br>
        <input type="date" id="joining" name="joining"
               value="2026-01-09">
        <br><br>

        <!-- Training Week -->
        <label for="week">Training Week:</label><br>
        <input type="week" id="week" name="week"
               value="2026-W07" readonly>
        <br><br>

        <!-- Interview Slot -->
        <label for="datetime">Interview Slot:</label><br>
        <input type="datetime-local" id="datetime" name="datetime">
        <br><br>

    </fieldset>

    <fieldset>
        <legend>Selection & Upload</legend>

        <!-- Technology -->
        <label for="technology">Technology:</label><br>
        <select id="technology" name="technology">
            <option>.Net</option>
            <option>Angular</option>
            <option>Java</option>
            <option>ReactJS</option>
            <option>QA</option>
        </select>
        <br><br>

        <!-- Resume Upload -->
        <label for="resume">Upload Resume (PDF only):</label><br>
        <input type="file" id="resume" name="resume"
               accept="application/pdf">
        <br><br>

    </fieldset>

    <!-- Hidden Field -->
    <input type="hidden" name="userID" value="USR12345">

    <br>

    <!-- Buttons -->
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
    <button type="button">Click Me</button>

</form>

</body>
</html>
