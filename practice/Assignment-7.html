<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multimedia Practice</title>
</head>
<body>

    <h1>HTML5 Multimedia Practice</h1>

    <h2>Part 1: Audio Practice</h2>
    <audio controls autoplay muted loop>
        <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <hr>

    <h2>Part 2: Video Practice</h2>
    <video width="500" height="300" controls muted>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <hr>

    <h2>Part 3: iFrame Practice</h2>

    <p>1) Video file inside an iframe</p>
    <iframe
        src="https://www.w3schools.com/html/mov_bbb.mp4"
        width="500"
        height="300"
        title="Video File in iFrame">
    </iframe>

    <br><br>

    <p>2) External website (tutorial/documentation)</p>
    <iframe
        src="https://www.w3schools.com/html/"
        width="800"
        height="400"
        title="External Tutorial Website">
    </iframe>

    <br><br>

    <p>3) Local HTML file from the same folder</p>
    <iframe
        src="Assignment-4.html"
        width="800"
        height="400"
        title="Local HTML File">
    </iframe>

</body>
</html>
